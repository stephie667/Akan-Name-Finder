<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akan Name Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1>Akan-Name Finder</h1>
            <p> Ever wondered what your name would be in another country? Enter your birthday and gender to discover your Ghanaian day name</p>
        </div>
        
        <form id="Akan Name form">
                 <div class="main-form">
            <label for="birthday">Birthday</label>
            <input type="date" id="birthday">
                 </div>
                 <div class="main-form">
            <label for="gender"></label>
            <p>select your gender?</p>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">female</label>
                 </div>
      <button type="button" class="btn" onclick="findAkanName()">calculate name</button>
            <p id="result"></p> 
        </form>
    </div>
  <script src="script.js"></script>
</body>
</html>
