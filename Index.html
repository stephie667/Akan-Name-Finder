<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akan Name Finder</title>
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1>Akan-Name Finder</h1>
            <p>ever wondered what your name would be in another country? Enter your birthday and gender to discover your Ghanaian day name</p>
        </div>
        
        <form id="Akan Name form">
             <div class="form-group">
              <label for="birthday"></label>
            </div>
    
             <div class="form-group"></div>
               <input type="date">
               <label for="gender"></label>
               <select name="Gender" id="Genderselect"></select>
               <option value="select gender"></option>
               <option value="male"></option>
               <option value="female"></option>  
             </div>
      <button type="submit" class="btn">calculate name</button>
</body>
</html>
